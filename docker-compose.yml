services:
  postgres:
    image: postgres:16
    container_name: deviceinventory-postgres
    environment:
      POSTGRES_DB: deviceinventory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: deviceinventory-app
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"