spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop

  flyway:
    enabled: false

app:
  security:
    viewer-user: ${TEST_VIEWER_USER:test-viewer}
    viewer-password: ${TEST_VIEWER_PASSWORD:test-password}
    admin-user: ${TEST_ADMIN_USER:test-admin}
    admin-password: ${TEST_ADMIN_PASSWORD:test-password}