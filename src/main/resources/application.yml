spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    viewer-user: viewer
    viewer-password: ${VIEWER_PASSWORD}
    admin-user: admin
    admin-password: ${ADMIN_PASSWORD}
